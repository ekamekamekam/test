<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Form Preview</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #f3f7ff, #eef2f7);
    }

    .card {
      width: min(100%, 420px);
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.12);
    }

    form {
      display: grid;
      gap: 12px;
    }

    input,
    textarea,
    button {
      font: inherit;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid #cfd7e3;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    button {
      border: 0;
      background: #1f6feb;
      color: white;
      cursor: pointer;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="card">
    <form action="https://formbold.com/s/9mB72" method="POST">
      <input type="email" placeholder="Email" name="email">
      <input type="text" placeholder="Subject" name="subject">
      <textarea name="message" placeholder="Type your message"></textarea>
      <button type="submit">Send Message</button>
    </form>
  </div>
</body>
</html>
